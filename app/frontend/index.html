<!DOCTYPE html>
<html>
<head>
  <title>Fintech App</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    input { padding: 8px; margin-right: 8px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 8px 16px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    ul { margin-top: 20px; }
    li { padding: 6px 0; border-bottom: 1px solid #eee; }
  </style>
</head>
<body>
  <h1>Fintech App — Users</h1>

  <input id="name" placeholder="Enter name" />
  <button onclick="addUser()">Add User</button>

  <ul id="users"></ul>

  <script>
    // API_URL is replaced at deploy time by the actual backend service URL
    // In production: http://backend-service/api (via Kubernetes service discovery)
    const API = window.API_URL || "http://localhost:3000/api";

    async function loadUsers() {
      try {
        const res = await fetch(API + "/users");
        const users = await res.json();
        const list = document.getElementById("users");
        list.innerHTML = "";
        users.forEach(u => {
          const li = document.createElement("li");
          li.textContent = u.name;
          list.appendChild(li);
        });
      } catch (err) {
        console.error("Failed to load users:", err);
      }
    }

    async function addUser() {
      const name = document.getElementById("name").value;
      if (!name.trim()) return;
      try {
        await fetch(API + "/users", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name })
        });
        document.getElementById("name").value = "";
        loadUsers();
      } catch (err) {
        console.error("Failed to add user:", err);
      }
    }

    loadUsers();
  </script>
</body>
</html>
