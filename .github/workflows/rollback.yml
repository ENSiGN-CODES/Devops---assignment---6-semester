# =============================================================
# ROLLBACK PIPELINE
# Triggered manually from GitHub Actions UI
# Usage: Actions → Rollback Pipeline → Run workflow → enter tag
# =============================================================

name: Rollback Pipeline

on:
  workflow_dispatch:
    inputs:
      rollback_tag:
        description: "Image tag to roll back to (e.g. a1b2c3d4)"
        required: true
        type: string
      reason:
        description: "Reason for rollback"
        required: true
        type: string

env:
  ECR_BACKEND_REPO: fintech-backend
  ECR_FRONTEND_REPO: fintech-frontend

jobs:
  rollback:
    name: Rollback to Previous Tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify Tag Exists in ECR Before Rolling Back
        run: |
          echo "Verifying tag ${{ inputs.rollback_tag }} exists..."
          aws ecr describe-images \
            --repository-name ${{ env.ECR_BACKEND_REPO }} \
            --image-ids imageTag=${{ inputs.rollback_tag }} \
            --region ${{ secrets.AWS_REGION }}
          echo "Tag confirmed — proceeding"

      - name: Update Manifests to Rollback Tag
        run: |
          IMAGE_TAG=${{ inputs.rollback_tag }}
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          sed -i "s|image: .*fintech-backend:.*|image: ${ECR_REGISTRY}/${{ env.ECR_BACKEND_REPO }}:${IMAGE_TAG}|g" kubernetes/backend/deployment.yaml
          sed -i "s|image: .*fintech-frontend:.*|image: ${ECR_REGISTRY}/${{ env.ECR_FRONTEND_REPO }}:${IMAGE_TAG}|g" kubernetes/frontend/deployment.yaml

      - name: Commit Rollback
        run: |
          git config user.name "GitHub Rollback Bot"
          git config user.email "actions@github.com"
          git add kubernetes/backend/deployment.yaml kubernetes/frontend/deployment.yaml
          git commit -m "rollback: revert to ${{ inputs.rollback_tag }} — ${{ inputs.reason }} [skip ci]"
          git push

      - name: Sync Argo CD
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 argocd /usr/local/bin/argocd
          argocd login ${{ secrets.ARGOCD_SERVER }} --auth-token ${{ secrets.ARGOCD_AUTH_TOKEN }} --insecure
          argocd app sync fintech-app --force
          argocd app wait fintech-app --health --timeout 300
          echo "Rollback to ${{ inputs.rollback_tag }} complete"
