apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: fintech
  labels:
    app: backend
    tier: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  # RollingUpdate = zero downtime deployments
  # New pod must pass readinessProbe before old pod is removed
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: backend
        tier: api
    spec:
      containers:
        - name: backend
          # Image tag replaced by GitHub Actions CI/CD with commit SHA
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/fintech-backend:latest
          ports:
            - containerPort: 3000   # Must match app.listen(3000) in server.js
          env:
            # All DB credentials injected from Kubernetes Secret (never hardcoded)
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: host
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: dbname
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: DB_PORT
              value: "5432"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # readinessProbe: pod gets traffic ONLY when /api/health returns 200
          # This is what makes rolling updates zero-downtime
          readinessProbe:
            httpGet:
              path: /api/health    # Matches actual route in server.js
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          # livenessProbe: restart pod if it stops responding
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
      # Spread pods across different nodes for HA
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - backend
                topologyKey: "kubernetes.io/hostname"
