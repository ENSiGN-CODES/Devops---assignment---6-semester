# Namespace for all fintech resources
apiVersion: v1
kind: Namespace
metadata:
  name: fintech
  labels:
    name: fintech
---
# DB credentials secret - populated by CI/CD pipeline from AWS Secrets Manager
# NEVER hardcode passwords here. The actual values are injected during deployment.
# In production, use External Secrets Operator to sync from AWS Secrets Manager.
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: fintech
type: Opaque
# These are base64 encoded placeholders - replaced by pipeline from AWS Secrets Manager
# To encode: echo -n "yourvalue" | base64
data:
  host: <BASE64_ENCODED_RDS_HOST>
  dbname: <BASE64_ENCODED_DB_NAME>
  username: <BASE64_ENCODED_DB_USER>
  password: <BASE64_ENCODED_DB_PASSWORD>
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: fintech
type: Opaque
data:
  host: <BASE64_ENCODED_REDIS_HOST>
---
# External Secrets Operator config (production best practice)
# Syncs secrets from AWS Secrets Manager automatically
# Requires: helm install external-secrets external-secrets/external-secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-external-secret
  namespace: fintech
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: db-credentials
    creationPolicy: Owner
  data:
    - secretKey: host
      remoteRef:
        key: fintech-postgres-password
        property: endpoint
    - secretKey: username
      remoteRef:
        key: fintech-postgres-password
        property: username
    - secretKey: password
      remoteRef:
        key: fintech-postgres-password
        property: password
    - secretKey: dbname
      remoteRef:
        key: fintech-postgres-password
        property: dbname
