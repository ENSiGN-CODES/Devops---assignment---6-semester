# =============================================================
# CI/CD PIPELINE — GitHub Actions
# App: Node.js backend (Express+PostgreSQL) + HTML frontend
#
# STAGES:
#   1. Build & Test    → runs on every push + PR
#   2. Push to ECR     → only on push to main
#   3. Update Manifests → updates image tags in K8s YAMLs
#   4. Deploy via Argo CD → syncs cluster
#
# GitHub Secrets needed:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   AWS_ACCOUNT_ID, AWS_REGION
#   ARGOCD_SERVER, ARGOCD_AUTH_TOKEN
# =============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_BACKEND_REPO: fintech-backend
  ECR_FRONTEND_REPO: fintech-frontend

jobs:

  # ─────────────────────────────────────────
  # STAGE 1: BUILD & TEST
  # ─────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build backend image (Node.js) — context is app/backend
      - name: Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend
          file: ./docker/backend/Dockerfile
          push: false
          tags: fintech-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build frontend image (Nginx + HTML) — context is app/frontend
      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          file: ./docker/frontend/Dockerfile
          push: false
          tags: fintech-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Run backend tests (uses npm test from package.json)
      - name: Run Backend Tests
        run: |
          docker run --rm fintech-backend:test npm test

      # Security scan — fail build if CRITICAL vulnerability found
      - name: Scan Backend Image for Vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fintech-backend:test
          format: table
          exit-code: 1
          severity: CRITICAL

  # ─────────────────────────────────────────
  # STAGE 2: PUSH TO ECR
  # Only runs on push to main (not PRs)
  # ─────────────────────────────────────────
  push-to-ecr:
    name: Push Images to ECR
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Tag with first 8 chars of commit SHA — full traceability
      - name: Set Image Tag from Commit SHA
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Building image tag: ${SHORT_SHA}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Push backend: tagged with commit SHA + latest
      - name: Build and Push Backend to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend
          file: ./docker/backend/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_BACKEND_REPO }}:${{ steps.meta.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_BACKEND_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Push frontend: tagged with commit SHA + latest
      - name: Build and Push Frontend to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          file: ./docker/frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_FRONTEND_REPO }}:${{ steps.meta.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_FRONTEND_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # STAGE 3: UPDATE K8S MANIFESTS
  # Updates image tags in YAML → Argo CD picks up the change
  # ─────────────────────────────────────────
  update-k8s-manifests:
    name: Update Kubernetes Manifests
    runs-on: ubuntu-latest
    needs: push-to-ecr
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update Image Tags in Deployment YAMLs
        run: |
          IMAGE_TAG=${{ needs.push-to-ecr.outputs.image-tag }}
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}

          sed -i "s|image: .*fintech-backend:.*|image: ${ECR_REGISTRY}/${{ env.ECR_BACKEND_REPO }}:${IMAGE_TAG}|g" \
            kubernetes/backend/deployment.yaml

          sed -i "s|image: .*fintech-frontend:.*|image: ${ECR_REGISTRY}/${{ env.ECR_FRONTEND_REPO }}:${IMAGE_TAG}|g" \
            kubernetes/frontend/deployment.yaml

          echo "Updated image tags to: ${IMAGE_TAG}"

      # Commit updated manifests back to Git
      # Argo CD watches this repo and auto-deploys on this commit
      - name: Commit Manifest Changes to Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add kubernetes/backend/deployment.yaml kubernetes/frontend/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ needs.push-to-ecr.outputs.image-tag }} [skip ci]"
          git push

  # ─────────────────────────────────────────
  # STAGE 4: DEPLOY VIA ARGO CD
  # ─────────────────────────────────────────
  deploy-via-argocd:
    name: Deploy via Argo CD
    runs-on: ubuntu-latest
    needs: update-k8s-manifests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Install Argo CD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 argocd /usr/local/bin/argocd

      - name: Sync Argo CD Application
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} \
            --auth-token ${{ secrets.ARGOCD_AUTH_TOKEN }} \
            --insecure
          argocd app sync fintech-app --force
          # Wait up to 5 minutes for healthy status
          argocd app wait fintech-app --health --timeout 300

      - name: Print Deployment Summary
        run: |
          echo "✅ Deployment complete!"
          echo "Image tag: ${{ needs.push-to-ecr.outputs.image-tag }}"
          argocd app get fintech-app
